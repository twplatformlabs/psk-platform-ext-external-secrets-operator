workflows:

  deploy sandbox role configuration:
    when:
      not:
        equal: [ scheduled_pipeline, << pipeline.trigger_source >> ]
    jobs:
      - update external-secrets-operator deployment configuration:
          name: update sandbox configuration
          context: *context
          cluster-role: sandbox
          filters: *on-push-main

